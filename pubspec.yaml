name: koperasi
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.1
  cupertino_icons: ^1.0.8
  
  # Tambahkan untuk penanganan gambar real
  image_picker: ^1.0.4  # Untuk mengambil gambar dari kamera/galeri
  path: ^1.8.3          # Untuk manipulasi path file

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  # Aktifkan aset logo
  assets:
    - assets/images/logo.jpeg